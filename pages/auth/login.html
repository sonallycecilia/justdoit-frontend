<!-- @startingPoint section="JustDoIt Frontend" subtitle="Tela de entrada / login — split-screen evergreen" viewport="1240x800" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustDoIt - Entrar</title>
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<meta name="description" content="JustDoIt — planejamento semanal, foco e clareza. Entre na sua conta.">
<link rel="stylesheet" href="../../styles/tokens.css?v=2">
<link rel="stylesheet" href="../../styles/reset.css?v=2">
<link rel="stylesheet" href="../../styles/global.css?v=2">
<link rel="stylesheet" href="../../styles/components/button.css?v=2">
<link rel="stylesheet" href="../../styles/components/auth.css?v=2">
</head>
<body>
  <!-- Botão de tema (claro/escuro) -->
  <button class="btn-icon auth__theme" id="themeToggle" aria-label="Alternar tema">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  </button>

  <div class="auth">
    <!-- Painel da marca -->
    <aside class="auth__aside">
      <span class="auth__mark">
          <svg width="60" height="60" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M33 7 L46.5 21 L39.6 21 L39.6 36.4 C39.6 44.2 34.6 48.9 27 48.3 C19.8 47.7 15.3 42.6 15.9 37.5 C16.3 33.9 18.9 31.9 21.9 32.5 C24.4 33 25.6 35.4 24.2 37.4 C23.2 38.8 21.4 38.7 20.6 37.6 M33 7 L19.5 21 L26.4 21 L26.4 36.4 C26.4 40 28.8 42.3 32.2 42.3"/></svg>
        </span>

      <div class="auth__quote">
        <h2>Seu dia <em>+leve.</em></h2>
        <p>Planeje, foque e acompanhe o que realmente importa.</p>
      </div>
      <div class="auth__bottom">
        <div class="auth__foot">Gerenciador de Tarefas</div>
          <div class="auth__brand">
            <span class="auth__word">JustDoIt</span>
          </div>
      </div>
    </aside>

    <!-- Formulário -->
    <main class="auth__main">
      <div class="auth__card">
        <!-- Formulário de login -->
        <div id="loginView">
          <div class="auth__head">
            <div class="auth__eyebrow">Bem-vindo de volta</div>
            <h1 class="auth__title">Entrar</h1>
            <p class="auth__sub">Novo por aqui? <a href="signup.html" id="goSignup">Criar uma conta</a></p>
          </div>

          <form class="auth__form" id="loginForm" novalidate>
            <div class="field">
              <label class="field__label" for="email">E-mail</label>
              <div class="field__control">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
                <input id="email" name="email" type="email" placeholder="voce@exemplo.com" autocomplete="email" required>
              </div>
            </div>

            <div class="field">
              <label class="field__label" for="senha">Senha</label>
              <div class="field__control">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input id="senha" name="senha" type="password" placeholder="Sua senha" autocomplete="current-password" required>
                <button type="button" class="field__eye" id="toggleSenha" aria-label="Mostrar senha">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <div class="auth__rowend">
              <label class="checkline"><input type="checkbox" id="lembrar" checked> Manter conectado</label>
              <a class="auth__forgot">Esqueceu a senha?</a>
            </div>

            <span class="field__error hidden" id="erroLogin"></span>
            <button type="submit" class="btn btn--primary btn--lg btn--full" id="submitBtn">Entrar</button>
          </form>

          <p class="auth__legal">Ao entrar, você concorda com os <a>Termos</a> e a <a>Política de Privacidade</a>.</p>
        </div>

      </div>
    </main>
  </div>

  <script src="../../scripts/core/storage.js?v=4"></script>
  <script src="../../scripts/core/api.js?v=5"></script>
  <script src="../../scripts/features/auth/auth.js?v=2"></script>
  <script src="../../scripts/features/auth/login.js?v=2"></script>
</body>
</html>
