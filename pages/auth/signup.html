<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustDoIt — Criar conta</title>
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<link rel="stylesheet" href="../../styles/tokens.css?v=2">
<link rel="stylesheet" href="../../styles/reset.css?v=2">
<link rel="stylesheet" href="../../styles/global.css?v=2">
<link rel="stylesheet" href="../../styles/components/button.css?v=2">
<link rel="stylesheet" href="../../styles/components/date-picker.css?v=2">
<link rel="stylesheet" href="../../styles/components/auth.css?v=4">
</head>
<body>
  <button class="btn-icon auth__theme" id="themeToggle" aria-label="Alternar tema">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  </button>

  <div class="auth auth--signup">
    <!-- Painel da marca -->
    <aside class="auth__aside">
      <div class="auth__brand">
        <span class="auth__mark">
          <svg width="60" height="60" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M33 7 L46.5 21 L39.6 21 L39.6 36.4 C39.6 44.2 34.6 48.9 27 48.3 C19.8 47.7 15.3 42.6 15.9 37.5 C16.3 33.9 18.9 31.9 21.9 32.5 C24.4 33 25.6 35.4 24.2 37.4 C23.2 38.8 21.4 38.7 20.6 37.6 M33 7 L19.5 21 L26.4 21 L26.4 36.4 C26.4 40 28.8 42.3 32.2 42.3"/></svg>
        </span>
      </div>
      <div class="auth__quote">
        <h2>Comece <em>agora.</em></h2>
        <p>Crie sua conta gratuitamente e descubra como um dia organizado pode ser leve.</p>
      </div>
      <ul class="auth__checklist">
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          Sem cartão de crédito
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          Configuração em 2 minutos
        </li>
      </ul>
         <div class="auth__bottom">
        <div class="auth__foot">Gerenciador de Tarefas</div>
          <div class="auth__brand">
            <span class="auth__word">JustDoIt</span>
          </div>
      </div>
    </aside>

    <!-- Formulário -->
    <main class="auth__main">
      <div class="auth__card">

        <div id="signupView">
          <div class="auth__head">
            <div class="auth__eyebrow">Vamos começar</div>
            <h1 class="auth__title">Criar conta</h1>
            <p class="auth__sub">Já tem uma conta? <a href="login.html">Entrar</a></p>
          </div>

          <form class="auth__form" id="signupForm" novalidate>

            <!-- Nome -->
            <div class="field">
              <label class="field__label" for="nome">Nome completo</label>
              <div class="field__control">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                <input id="nome" name="nome" type="text" placeholder="Seu nome" autocomplete="name" required>
              </div>
            </div>

            <!-- E-mail -->
            <div class="field">
              <label class="field__label" for="email">E-mail</label>
              <div class="field__control">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
                <input id="email" name="email" type="email" placeholder="voce@exemplo.com" autocomplete="email" required>
              </div>
              <span class="field__error hidden" id="erroEmail"></span>
            </div>

            <!-- Data de nascimento -->
            <div class="field">
              <label class="field__label">Data de nascimento</label>
              <div class="date-pick" id="nascimentoPick">
                <button class="field__control field__date-btn" id="nascimentoBtn" type="button">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;flex:none;color:var(--color-text-muted)"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                  <span id="nascimentoLabel" class="field__date-val">Selecionar data…</span>
                  <svg class="date-pick__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <input type="hidden" id="nascimento" name="nascimento">
              </div>
            </div>

            <!-- Senha -->
            <div class="field">
              <label class="field__label" for="senha">Senha</label>
              <div class="field__control">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input id="senha" name="senha" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required minlength="8">
                <button type="button" class="field__eye" id="toggleSenha" aria-label="Mostrar senha">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <!-- Confirmar senha -->
            <div class="field">
              <label class="field__label" for="confirmar">Confirmar senha</label>
              <div class="field__control">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input id="confirmar" name="confirmar" type="password" placeholder="Repita a senha" autocomplete="new-password" required>
                <button type="button" class="field__eye" id="toggleConfirmar" aria-label="Mostrar senha">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="field__error hidden" id="erroSenha">As senhas não coincidem.</span>
            </div>

            <!-- Termos -->
            <label class="checkline">
              <input type="checkbox" id="termos" required>
              Aceito os <a href="#" id="linkTermos">Termos de Uso</a> e a <a href="#" id="linkPrivacidade">Política de Privacidade</a>
            </label>

            <span class="field__error hidden" id="erroApi"></span>
            <button type="submit" class="btn btn--primary btn--lg btn--full" id="submitBtn">Criar conta</button>
          </form>


      </div>
    </main>
  </div>

  <!-- Modal de termos legais -->
  <div class="legal-modal" id="legalModal" hidden>
    <div class="legal-modal__backdrop" data-legal-close></div>
    <div class="legal-modal__card" role="dialog" aria-modal="true" aria-labelledby="legalModalTitle">
      <div class="legal-modal__head">
        <h2 class="legal-modal__title" id="legalModalTitle">Termos de Uso</h2>
        <button type="button" class="legal-modal__close" id="legalModalClose" data-legal-close aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="legal-modal__body" id="legalModalBody"></div>
      <div class="legal-modal__foot">
        <button type="button" class="btn btn--primary" data-legal-close>Entendi</button>
      </div>
    </div>
  </div>

  <!-- Conteúdo: Termos de Uso -->
  <template id="tplTermos">
    <p class="legal-modal__updated">Última atualização: 26 de junho de 2026</p>

    <h3>1. Aceitação dos termos</h3>
    <p>Ao criar uma conta e utilizar o JustDoIt ("Serviço"), você concorda com estes Termos de Uso. Caso não concorde, não utilize o Serviço.</p>

    <h3>2. Descrição do serviço</h3>
    <p>O JustDoIt é um gerenciador de tarefas que permite organizar atividades, categorias, lembretes e acompanhar sua produtividade. O Serviço é fornecido "no estado em que se encontra", podendo ser alterado ou descontinuado a qualquer momento.</p>

    <h3>3. Cadastro e conta</h3>
    <ul>
      <li>Você deve fornecer informações verdadeiras e mantê-las atualizadas.</li>
      <li>Você é responsável por manter a confidencialidade da sua senha e por todas as atividades realizadas na sua conta.</li>
      <li>É necessário ter idade mínima de 13 anos para criar uma conta.</li>
    </ul>

    <h3>4. Responsabilidades do usuário</h3>
    <p>Você concorda em não utilizar o Serviço para fins ilícitos, não tentar acessar contas de terceiros e não comprometer a segurança ou o funcionamento da plataforma.</p>

    <h3>5. Conteúdo do usuário</h3>
    <p>As tarefas e demais informações que você insere são de sua responsabilidade e permanecem de sua propriedade. Você nos concede apenas a permissão necessária para armazenar e exibir esse conteúdo a fim de operar o Serviço.</p>

    <h3>6. Limitação de responsabilidade</h3>
    <p>O JustDoIt não se responsabiliza por perdas de dados, prejuízos ou indisponibilidades decorrentes do uso do Serviço, na máxima extensão permitida pela lei.</p>

    <h3>7. Alterações</h3>
    <p>Estes Termos podem ser atualizados periodicamente. Mudanças relevantes serão comunicadas, e o uso contínuo do Serviço implica aceitação da versão vigente.</p>
  </template>

  <!-- Conteúdo: Política de Privacidade -->
  <template id="tplPrivacidade">
    <p class="legal-modal__updated">Última atualização: 26 de junho de 2026</p>

    <p>Esta Política descreve como o JustDoIt trata seus dados pessoais, em conformidade com a Lei Geral de Proteção de Dados (LGPD – Lei nº 13.709/2018).</p>

    <h3>1. Dados que coletamos</h3>
    <ul>
      <li><strong>Dados de cadastro:</strong> nome, e-mail e data de nascimento.</li>
      <li><strong>Dados de uso:</strong> tarefas, categorias, lembretes e configurações que você cria.</li>
      <li><strong>Dados técnicos:</strong> informações de sessão necessárias para manter você conectado.</li>
    </ul>

    <h3>2. Como usamos seus dados</h3>
    <p>Utilizamos seus dados para criar e autenticar sua conta, fornecer as funcionalidades do Serviço, salvar suas tarefas e melhorar a experiência de uso.</p>

    <h3>3. Base legal</h3>
    <p>O tratamento se baseia na execução do contrato (prestação do Serviço) e no seu consentimento, conforme a LGPD.</p>

    <h3>4. Compartilhamento</h3>
    <p>Não vendemos seus dados. O compartilhamento ocorre apenas quando necessário para operar o Serviço (por exemplo, provedores de infraestrutura) ou por obrigação legal.</p>

    <h3>5. Armazenamento e segurança</h3>
    <p>Adotamos medidas técnicas razoáveis para proteger seus dados, incluindo o armazenamento de senhas de forma criptografada. Nenhum sistema, porém, é totalmente imune a riscos.</p>

    <h3>6. Seus direitos</h3>
    <p>Você pode, a qualquer momento, solicitar acesso, correção, exclusão ou portabilidade dos seus dados, bem como revogar o consentimento, conforme o art. 18 da LGPD.</p>

    <h3>7. Armazenamento local</h3>
    <p>Utilizamos o armazenamento do seu navegador (localStorage) para guardar dados de sessão e preferências, como o tema. Você pode limpá-los pelas configurações do navegador.</p>

    <h3>8. Retenção</h3>
    <p>Mantemos seus dados enquanto sua conta estiver ativa. Após o encerramento, eles são removidos ou anonimizados, salvo obrigação legal de retenção.</p>

    <h3>9. Alterações</h3>
    <p>Esta Política pode ser atualizada. Alterações relevantes serão comunicadas dentro do Serviço.</p>
  </template>

  <script src="../../scripts/core/storage.js?v=4"></script>
  <script src="../../scripts/core/utils.js?v=2"></script>
  <script src="../../scripts/core/api.js?v=6"></script>
  <script src="../../scripts/components/date-picker.js?v=2"></script>
  <script src="../../scripts/features/auth/auth.js?v=2"></script>
  <script src="../../scripts/features/auth/signup.js?v=7"></script>
</body>
</html>
