<!-- @startingPoint section="JustDoIt Frontend" subtitle="Onboarding guiado — perfil, módulos recomendados, primeira tarefa" viewport="900x820" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustDoIt — Vamos começar</title>
<link rel="stylesheet" href="../../styles/tokens.css">
<link rel="stylesheet" href="../../styles/reset.css">
<link rel="stylesheet" href="../../styles/global.css">
<link rel="stylesheet" href="../../styles/components/button.css">
<link rel="stylesheet" href="../../styles/components/card.css">
<link rel="stylesheet" href="../../styles/pages/onboarding.css">
</head>
<body>
  <div class="onb">
    <div class="onb__top">
      <div class="onb__brand">
        <span class="onb__brand-mark"><svg width="22" height="22" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M33 7 L46.5 21 L39.6 21 L39.6 36.4 C39.6 44.2 34.6 48.9 27 48.3 C19.8 47.7 15.3 42.6 15.9 37.5 C16.3 33.9 18.9 31.9 21.9 32.5 C24.4 33 25.6 35.4 24.2 37.4 C23.2 38.8 21.4 38.7 20.6 37.6 M33 7 L19.5 21 L26.4 21 L26.4 36.4 C26.4 40 28.8 42.3 32.2 42.3"/></svg></span>
        <span class="onb__brand-word">JustDoIt</span>
      </div>
      <a class="onb__skip" href="../dashboard/dashboard.html">Pular configuração</a>
    </div>

    <div class="onb__steps">
      <span class="onb__step is-active" data-step="0"></span>
    </div>

    <div class="onb__card card card--pad">
      <!-- Passo 1: Primeira categoria + tarefa -->
      <div class="onb__panel is-active" data-panel="0">
        <h1 class="onb__title">Crie sua primeira tarefa</h1>
        <p class="onb__sub">Comece com uma categoria e uma tarefa — você pode adicionar mais depois.</p>
        <div class="onb-field">
          <label class="onb-field__label">Nome da categoria</label>
          <input class="onb-input" id="catName" placeholder="Ex.: Faculdade" value="Faculdade">
        </div>
        <div class="onb-field">
          <label class="onb-field__label">Cor</label>
          <div class="color-picker" id="colorPicker">
            <span class="color-swatch is-sel" style="background:var(--color-cat-estudos)" data-color="estudos"></span>
            <span class="color-swatch" style="background:var(--color-cat-casa)" data-color="casa"></span>
            <span class="color-swatch" style="background:var(--color-priority-urgent)" data-color="urgent"></span>
            <span class="color-swatch" style="background:var(--color-priority-normal)" data-color="normal"></span>
            <span class="color-swatch" style="background:var(--brand-sage)" data-color="sage"></span>
          </div>
        </div>
        <div class="onb-field">
          <label class="onb-field__label">Primeira tarefa</label>
          <input class="onb-input" id="taskName" placeholder="O que você precisa fazer?" value="Revisar Cálculo II">
        </div>
      </div>

      <!-- Sucesso -->
      <div class="onb__panel" data-panel="1">
        <div class="onb-done">
          <div class="onb-done__ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
          <h1 class="onb__title">Tudo pronto, Sonally!</h1>
          <p class="onb__sub">Seu espaço está configurado. Vamos para o seu dia.</p>
          <a class="btn btn--primary btn--lg" href="../dashboard/dashboard.html">Ir para o painel</a>
        </div>
      </div>

      <!-- Navegação -->
      <div class="onb__nav" id="onbNav">
        <button class="btn btn--ghost btn--md" id="btnBack" style="visibility:hidden">Voltar</button>
        <button class="btn btn--primary btn--md" id="btnNext">Continuar</button>
      </div>
    </div>
  </div>

  <script src="../../scripts/core/storage.js"></script>
  <script src="../../scripts/core/api.js"></script>
  <script src="../../scripts/features/auth/auth.js"></script>
  <script src="../../scripts/core/auth-guard.js"></script>
  <script src="../../scripts/features/auth/onboarding.js"></script>
</body>
</html>
