<!-- @startingPoint section="JustDoIt Frontend" subtitle="Onboarding guiado — perfil, módulos recomendados, primeira tarefa" viewport="900x820" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustDoIt — Vamos começar</title>
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles/tokens.css?v=2">
<link rel="stylesheet" href="../../styles/reset.css?v=2">
<link rel="stylesheet" href="../../styles/global.css?v=3">
<link rel="stylesheet" href="../../styles/components/button.css?v=2">
<link rel="stylesheet" href="../../styles/components/card.css?v=2">
<link rel="stylesheet" href="../../styles/pages/onboarding.css?v=3">
</head>
<body>
  <div class="onb">
    <div class="onb__top">
      <div class="onb__brand">
        <span class="onb__brand-mark"><svg width="22" height="22" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M33 7 L46.5 21 L39.6 21 L39.6 36.4 C39.6 44.2 34.6 48.9 27 48.3 C19.8 47.7 15.3 42.6 15.9 37.5 C16.3 33.9 18.9 31.9 21.9 32.5 C24.4 33 25.6 35.4 24.2 37.4 C23.2 38.8 21.4 38.7 20.6 37.6 M33 7 L19.5 21 L26.4 21 L26.4 36.4 C26.4 40 28.8 42.3 32.2 42.3"/></svg></span>
        <span class="onb__brand-word">JustDoIt</span>
      </div>
      <a class="onb__skip" href="../dashboard/dashboard.html">Pular configuração</a>
    </div>

    <div class="onb__steps">
      <span class="onb__step is-active" data-step="0"></span>
    </div>

    <div class="onb__card card card--pad">
      <!-- Passo 1: Primeira categoria + tarefa -->
      <div class="onb__panel is-active" data-panel="0">
        <h1 class="onb__title">Crie sua primeira tarefa</h1>
        <p class="onb__sub">Comece com uma categoria e uma tarefa — você pode adicionar mais depois.</p>
        <div class="onb-field">
          <label class="onb-field__label">Nome da categoria</label>
          <input class="onb-input" id="catName" placeholder="Ex.: Faculdade">
        </div>
        <div class="onb-field">
          <label class="onb-field__label">Cor</label>
          <div class="color-picker" id="colorPicker">
            <span class="color-swatch is-sel" style="background:var(--color-cat-teal)" data-color="var(--color-cat-teal)"></span>
            <span class="color-swatch" style="background:var(--color-cat-rust)" data-color="var(--color-cat-rust)"></span>
            <span class="color-swatch" style="background:var(--color-cat-green)" data-color="var(--color-cat-green)"></span>
            <span class="color-swatch" style="background:var(--color-cat-sage)" data-color="var(--color-cat-sage)"></span>
            <span class="color-swatch" style="background:var(--color-cat-purple)" data-color="var(--color-cat-purple)"></span>
            <span class="color-swatch" style="background:var(--color-cat-pink)" data-color="var(--color-cat-pink)"></span>
            <span class="color-swatch" style="background:var(--color-cat-blue)" data-color="var(--color-cat-blue)"></span>
            <span class="color-swatch" style="background:var(--color-cat-terracotta)" data-color="var(--color-cat-terracotta)"></span>
            <span class="color-swatch" style="background:var(--color-cat-plum)" data-color="var(--color-cat-plum)"></span>
          </div>
        </div>
        <div class="onb-field">
          <label class="onb-field__label">Primeira tarefa</label>
          <input class="onb-input" id="taskName" placeholder="O que você precisa fazer?">
        </div>
      </div>

      <p class="onb__error" id="onbError" hidden role="alert"></p>

      <!-- Navegação -->
      <div class="onb__nav" id="onbNav">
        <button class="btn btn--primary btn--md" id="btnNext" disabled>Concluir</button>
      </div>
    </div>
  </div>

  <script src="../../scripts/core/storage.js?v=4"></script>
  <script src="../../scripts/core/api.js?v=5"></script>
  <script src="../../scripts/features/auth/auth.js?v=2"></script>
  <script src="../../scripts/core/auth-guard.js?v=2"></script>
  <script src="../../scripts/features/auth/onboarding.js?v=3"></script>
</body>
</html>
