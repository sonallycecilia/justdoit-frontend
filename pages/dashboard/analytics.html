<!-- @startingPoint section="JustDoIt Frontend" subtitle="Análise semanal (React) — gráficos de desvio e categorias" viewport="1240x900" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustDoIt - Análise</title>
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles/tokens.css?v=2">
<link rel="stylesheet" href="../../styles/reset.css?v=2">
<link rel="stylesheet" href="../../styles/global.css?v=5">
<link rel="stylesheet" href="../../styles/components/button.css?v=2">
<link rel="stylesheet" href="../../styles/components/sidebar.css?v=8">
<link rel="stylesheet" href="../../styles/components/card.css?v=2">
<link rel="stylesheet" href="../../styles/components/badge.css?v=2">
<link rel="stylesheet" href="../../styles/pages/analytics.css?v=2">
</head>
<body>
  <div class="app">
    <aside data-sidebar data-active="analytics"></aside>
    <main class="app__main">
      <div class="page">
        <header class="page__head">
          <div>
            <div class="page__eyebrow">Semana de 8 – 14 jun</div>
            <h1 class="page__title">Análise semanal</h1>
          </div>
        </header>

        <div class="an-grid">
          <!-- Desvio planejado vs. executado -->
          <div class="card an-card an-wide">
            <div class="an-card__head">
              <span class="an-card__title">Planejado vs. executado</span>
              <div class="an-legend">
                <span class="an-legend__item"><span class="an-legend__sw" style="background:var(--color-border-strong)"></span>Planejado</span>
                <span class="an-legend__item"><span class="an-legend__sw" style="background:var(--color-accent)"></span>Executado</span>
              </div>
            </div>
            <div id="deviation"></div>
          </div>

          <!-- Alocação por categoria -->
          <div class="card an-card">
            <div class="an-card__head">
              <span class="an-card__title">Tempo por categoria</span>
            </div>
            <div id="category"></div>
          </div>

          <!-- Taxa de conclusão -->
          <div class="card an-card">
            <div class="an-card__head">
              <span class="an-card__title">Conclusão da semana</span>
            </div>
            <div id="rate"></div>
          </div>

          <!-- Insights -->
          <div class="card an-card an-wide">
            <div class="an-card__head">
              <span class="an-card__title">Resumo e insights</span>
              <span class="an-card__hint">Gerado a partir da sua semana</span>
            </div>
            <div id="insights" style="color: var(--color-text-subtle); padding: var(--space-md)">Em breve.</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../scripts/core/storage.js?v=5"></script>
  <script src="../../scripts/core/api.js?v=9"></script>
  <script src="../../scripts/features/auth/auth.js?v=3"></script>
  <script src="../../scripts/core/auth-guard.js?v=3"></script>
  <script src="../../scripts/core/utils.js?v=4"></script>
  <script src="../../scripts/modules/categorias.js?v=4"></script>
  <script src="../../scripts/modules/tarefas.js?v=11"></script>
  <script src="../../scripts/components/sidebar.js?v=12"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../../components/Dashboard/DeviationChart.jsx?v=2"></script>
  <script type="text/babel" src="../../components/Dashboard/CategoryChart.jsx?v=2"></script>
  <script type="text/babel">
    function RateRing({ conclusao }) {
      if (!conclusao) return <div className="an-rate" style={{ color: 'var(--color-text-subtle)' }}>Sem dados</div>;
      const pct = conclusao.total ? Math.round((conclusao.feitas / conclusao.total) * 100) : 0;
      const r = 58, c = 2 * Math.PI * r, dash = (pct / 100) * c;
      return (
        <div className="an-rate">
          <svg className="an-rate__ring" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r={r} fill="none" stroke="var(--color-surface-sunken)" strokeWidth="14" />
            <circle cx="70" cy="70" r={r} fill="none" stroke="var(--color-success)" strokeWidth="14"
              strokeLinecap="round" strokeDasharray={`${dash} ${c - dash}`} transform="rotate(-90 70 70)" />
            <text x="70" y="76" textAnchor="middle" fontSize="30" fontWeight="600" fill="var(--color-text)" style={{ fontFamily: 'var(--font-display)' }}>{pct}%</text>
          </svg>
          <div className="an-rate__info">
            <div className="an-rate__sub">tarefas concluídas</div>
            <div className="an-rate__stats">
              <div><div className="an-rate__stat-v">{conclusao.feitas}</div><div className="an-rate__stat-l">concluídas</div></div>
              <div><div className="an-rate__stat-v">{conclusao.total - conclusao.feitas}</div><div className="an-rate__stat-l">restantes</div></div>
              <div><div className="an-rate__stat-v">{conclusao.total}</div><div className="an-rate__stat-l">no total</div></div>
            </div>
          </div>
        </div>
      );
    }

    const devRoot  = ReactDOM.createRoot(document.getElementById('deviation'));
    const catRoot  = ReactDOM.createRoot(document.getElementById('category'));
    const rateRoot = ReactDOM.createRoot(document.getElementById('rate'));

    // TODO(analytics): a feature de análise ainda não tem backend
    // (/analytics/weekly e /analytics/categories não existem — retornam 403).
    // Enquanto não entra, mostramos um placeholder em vez de chamar a API.
    // Quando os endpoints existirem, basta restaurar o Promise.all abaixo.
    const emBreve = (
      <div style={{ color: 'var(--color-text-subtle)', padding: 'var(--space-md)' }}>
        Em breve.
      </div>
    );
    devRoot.render(emBreve);
    catRoot.render(emBreve);
    rateRoot.render(emBreve);

    /* Reativar quando o backend de analytics existir:
    Promise.all([
      Api.get(Api.endpoints.analytics.weekly),
      Api.get(Api.endpoints.analytics.categories),
    ]).then(function (results) {
      const weekly = results[0];
      const cats   = results[1];
      devRoot.render(<DeviationChart dados={weekly.desvio || []} />);
      catRoot.render(<CategoryChart dados={Array.isArray(cats) ? cats : (weekly.categorias || [])} />);
      rateRoot.render(<RateRing conclusao={weekly.conclusao} />);
    }).catch(function () {
      const erro = <div style={{ color: 'var(--color-text-subtle)', padding: 'var(--space-md)' }}>Erro ao carregar dados.</div>;
      devRoot.render(erro);
      catRoot.render(erro);
      rateRoot.render(erro);
    });
    */
  </script>
</body>
</html>
