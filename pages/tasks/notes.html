<!-- @startingPoint section="JustDoIt Frontend" subtitle="Anotações — captura rápida e lista de notas" viewport="1240x860" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustDoIt - Anotações</title>
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles/tokens.css?v=2">
<link rel="stylesheet" href="../../styles/reset.css?v=2">
<link rel="stylesheet" href="../../styles/global.css?v=5">
<link rel="stylesheet" href="../../styles/components/button.css?v=2">
<link rel="stylesheet" href="../../styles/components/sidebar.css?v=8">
<link rel="stylesheet" href="../../styles/components/card.css?v=2">
<link rel="stylesheet" href="../../styles/components/badge.css?v=2">
<link rel="stylesheet" href="../../styles/pages/notes.css?v=1">
</head>
<body>
  <div class="app">
    <aside data-sidebar data-active="notes"></aside>

    <main class="app__main">
      <div class="page">
        <header class="page__head">
          <div>
            <h1 class="page__title">Anotações</h1>
            <div class="page__eyebrow">Todas as suas notas</div>
          </div>
        </header>

        <!-- Compositor: cria uma nota nova (POST /notes) -->
        <div class="notepad" data-note-composer>
          <div class="notepad__head">
            <span class="notepad__label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Nova anotação
            </span>
            <span class="notepad__hint" data-composer-hint>salvo automaticamente</span>
          </div>
          <textarea class="notepad__area" data-composer-area placeholder="Escreva uma anotação…"></textarea>
          <div class="notepad__foot">
            <span class="notepad__foot-tip">Ctrl + Enter para criar</span>
            <button class="btn btn--primary btn--sm" type="button" data-composer-create disabled>Criar nota</button>
          </div>
        </div>

        <div class="notes-head">
          <span class="notes-head__title">Minhas anotações</span>
          <span class="notes-head__count" id="notesCount">0</span>
        </div>

        <!-- Lista de todas as notas do usuário -->
        <div id="notesList"></div>
      </div>
    </main>
  </div>

  <script src="../../scripts/core/storage.js?v=4"></script>
  <script src="../../scripts/core/api.js?v=9"></script>
  <script src="../../scripts/features/auth/auth.js?v=2"></script>
  <script src="../../scripts/core/auth-guard.js?v=2"></script>
  <script src="../../scripts/core/utils.js?v=2"></script>
  <script src="../../scripts/modules/categorias.js?v=4"></script>
  <script src="../../scripts/modules/tarefas.js?v=10"></script>
  <script src="../../scripts/modules/notas.js?v=1"></script>
  <script src="../../scripts/components/sidebar.js?v=11"></script>
  <script src="../../scripts/components/note-composer.js?v=1"></script>
  <script src="../../scripts/features/notes/notes.js?v=1"></script>
</body>
</html>
