<!-- @startingPoint section="JustDoIt Frontend" subtitle="To Do list priorizada — filtros por categoria/status/data" viewport="1240x860" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustDoIt — To Do</title>
<link rel="stylesheet" href="../../styles/tokens.css?v=2">
<link rel="stylesheet" href="../../styles/reset.css?v=2">
<link rel="stylesheet" href="../../styles/global.css?v=2">
<link rel="stylesheet" href="../../styles/components/button.css?v=2">
<link rel="stylesheet" href="../../styles/components/sidebar.css?v=6">
<link rel="stylesheet" href="../../styles/components/card.css?v=2">
<link rel="stylesheet" href="../../styles/components/badge.css?v=2">
<link rel="stylesheet" href="../../styles/pages/todo.css?v=2">
</head>
<body>
  <div class="app">
    <aside data-sidebar data-active="todo"></aside>

    <main class="app__main">
      <div class="page">
        <header class="page__head">
          <div>
            <h1 class="page__title">To Do</h1>
            <div class="page__eyebrow">Todas as tarefas</div>
          </div>
        </header>

        <!-- Bloco de anotações -->
        <div class="notepad">
          <div class="notepad__head">
            <span class="notepad__label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Anotações
            </span>
            <span class="notepad__hint" id="notepadHint">salvo automaticamente</span>
          </div>
          <textarea class="notepad__area" id="notepadArea" placeholder="Escreva aqui suas anotações rápidas…"></textarea>
        </div>

        <div class="page__head-actions">
            <a class="btn btn--primary btn--md" href="task-detail.html">+ Nova tarefa</a>
        </div>

        <!-- Filtros -->
        <div class="filters">
          <!-- Categoria -->
          <div class="filter-group" data-filter="cat">
            <button class="filter-chip is-active" data-value="all">Todas</button>
            <button class="filter-chip" data-value="Estudos"><span class="filter-chip__dot" style="background:var(--color-cat-estudos)"></span>Estudos</button>
            <button class="filter-chip" data-value="Casa"><span class="filter-chip__dot" style="background:var(--color-cat-casa)"></span>Casa</button>
            <button class="filter-chip" data-value="Genérico"><span class="filter-chip__dot" style="background:var(--color-cat-generico)"></span>Genérico</button>
          </div>
          <!-- Status -->
          <div class="filter-group" data-filter="status">
            <button class="filter-chip is-active" data-value="open">Abertas</button>
            <button class="filter-chip" data-value="done">Concluídas</button>
            <button class="filter-chip" data-value="all">Todas</button>
          </div>
          <!-- Data -->
          <div class="filter-group" data-filter="date">
            <button class="filter-chip is-active" data-value="all">Qualquer data</button>
            <button class="filter-chip" data-value="today">Hoje</button>
            <button class="filter-chip" data-value="week">Esta semana</button>
          </div>
          <div class="filters__spacer"></div>
          <span class="filters__count" id="count">0 tarefas</span>
        </div>

        <!-- Lista agrupada por prioridade -->
        <div id="groups"></div>
      </div>
    </main>
  </div>

  <script src="../../scripts/core/storage.js?v=4"></script>
  <script src="../../scripts/core/api.js?v=5"></script>
  <script src="../../scripts/features/auth/auth.js?v=2"></script>
  <script src="../../scripts/core/auth-guard.js?v=2"></script>
  <script src="../../scripts/core/utils.js?v=2"></script>
  <script src="../../scripts/modules/categorias.js?v=4"></script>
  <script src="../../scripts/modules/tarefas.js?v=4"></script>
  <script src="../../scripts/components/sidebar.js?v=7"></script>
  <script src="../../scripts/modules/priority.js?v=2"></script>
  <script src="../../scripts/features/tasks/tasks.js?v=2"></script>
  <script src="../../scripts/features/tasks/todo.js?v=3"></script>
</body>
</html>
