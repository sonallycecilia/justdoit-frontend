<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustDoIt — Calendário</title>
<link rel="stylesheet" href="../../styles/tokens.css">
<link rel="stylesheet" href="../../styles/reset.css">
<link rel="stylesheet" href="../../styles/global.css">
<link rel="stylesheet" href="../../styles/components/button.css">
<link rel="stylesheet" href="../../styles/components/sidebar.css">
<link rel="stylesheet" href="../../styles/components/card.css">
<link rel="stylesheet" href="../../styles/components/badge.css">
<link rel="stylesheet" href="../../styles/pages/calendar.css">
<style> html,body{margin:0;height:100%} .app__main{overflow:hidden} </style>
</head>
<body>
  <div class="app">
    <aside data-sidebar data-active="calendar"></aside>
    <main class="app__main">
      <div id="calRoot"></div>
    </main>
  </div>

  <!-- Vanilla: sidebar + storage -->
  <script src="../../scripts/core/storage.js"></script>
  <script src="../../scripts/core/api.js"></script>
  <script src="../../scripts/features/auth/auth.js"></script>
  <script src="../../scripts/core/auth-guard.js"></script>
  <script src="../../scripts/core/utils.js"></script>
  <script src="../../scripts/modules/categorias.js"></script>
  <script src="../../scripts/modules/tarefas.js"></script>
  <script src="../../scripts/components/sidebar.js"></script>

  <!-- React + Babel (componentes dinâmicos) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../../components/Calendar/TimeBlock.jsx"></script>
  <script type="text/babel" src="../../components/Calendar/WeeklyCalendar.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('calRoot')).render(<WeeklyCalendar />);
  </script>
</body>
</html>
