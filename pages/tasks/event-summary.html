<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustDoIt — Resumo do evento</title>
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles/tokens.css?v=2">
<link rel="stylesheet" href="../../styles/reset.css?v=2">
<link rel="stylesheet" href="../../styles/global.css?v=2">
<link rel="stylesheet" href="../../styles/components/button.css?v=2">
<link rel="stylesheet" href="../../styles/components/sidebar.css?v=6">
<link rel="stylesheet" href="../../styles/components/card.css?v=2">
<link rel="stylesheet" href="../../styles/components/badge.css?v=2">
<link rel="stylesheet" href="../../styles/pages/event-summary.css?v=2">
<script>if (new URLSearchParams(location.search).get('embed')) document.documentElement.classList.add('is-embed');</script>
</head>
<body>
  <div class="app">
    <aside data-sidebar data-active="calendar"></aside>

    <main class="app__main">
      <div class="evsum" id="evsum">

        <div class="evsum__topbar">
          <a class="evsum__back" href="javascript:history.back()" id="backLink">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Voltar ao calendário
          </a>
          <div class="evsum__topbar-actions">
            <a class="btn btn--secondary btn--md" id="detailLink" href="#" style="display:none">Ver tarefa completa</a>
          </div>
        </div>

        <div class="evsum__head">
          <button class="evsum__check" id="checkBtn" aria-label="Concluir tarefa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"/>
              <path class="evsum__check-tick" d="m8 12 3 3 5-5"/>
            </svg>
          </button>
          <h1 class="evsum__title" id="evTitle">—</h1>
        </div>

        <div class="evsum__chips">
          <span class="evsum__time-tag" id="timeTag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
            <span id="timeVal">—</span>
          </span>
          <span class="evsum__date-tag" id="dateTag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span id="dateVal">—</span>
          </span>
        </div>

        <div class="evsum__card card">

          <section class="evsum__section">
            <div class="evsum__section-head">Prioridade</div>
            <div class="evsum__prio-row" id="prioRow"></div>
          </section>

          <section class="evsum__section">
            <div class="evsum__section-head">Categoria</div>
            <div class="evsum__cat-picker" id="catPicker"></div>
          </section>

          <div class="evsum__save-row">
            <button class="btn btn--primary btn--md" id="saveBtn">Salvar alterações</button>
            <span class="evsum__saved" id="savedHint">Salvo!</span>
          </div>

        </div>

      </div>
    </main>
  </div>

  <script src="../../scripts/core/storage.js?v=4"></script>
  <script src="../../scripts/core/api.js?v=5"></script>
  <script src="../../scripts/features/auth/auth.js?v=2"></script>
  <script src="../../scripts/core/auth-guard.js?v=2"></script>
  <script src="../../scripts/core/utils.js?v=2"></script>
  <script src="../../scripts/modules/categorias.js?v=4"></script>
  <script src="../../scripts/modules/tarefas.js?v=6"></script>
  <script src="../../scripts/components/sidebar.js?v=7"></script>
  <script src="../../scripts/modules/priority.js?v=2"></script>
  <script src="../../scripts/features/tasks/tasks.js?v=2"></script>
  <script src="../../scripts/features/tasks/event-summary.js?v=3"></script>
</body>
</html>
